name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    env:
      AUTH0_DOMAIN: example.auth0.com
      AUTH0_CLIENT_ID: ci-client-id
      AUTH0_CLIENT_SECRET: ci-client-secret
      AUTH0_SECRET: ci-auth0-secret-ci-auth0-secret-ci-auth0-secret
      APP_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run verification
        run: npm run verify

  authenticated-e2e:
    name: Authenticated admin E2E
    runs-on: ubuntu-latest
    needs: verify

    # Repository secrets are not made available to workflows from forked
    # pull requests. Run the real Auth0 test only after a push to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      CI: true

      DATABASE_URL: ${{ secrets.DATABASE_URL }}

      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
      AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}

      # Playwright starts the Next.js application inside this GitHub runner.
      # Do not use the production Vercel URL here.
      APP_BASE_URL: http://localhost:3000

      PLAYWRIGHT_AUTH0_EMAIL: ${{ secrets.PLAYWRIGHT_AUTH0_EMAIL }}
      PLAYWRIGHT_AUTH0_PASSWORD: ${{ secrets.PLAYWRIGHT_AUTH0_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated admin E2E tests
        run: npm run test:e2e:auth

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: authenticated-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: authenticated-playwright-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
